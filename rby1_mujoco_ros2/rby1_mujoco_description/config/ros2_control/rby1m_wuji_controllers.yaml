      - right_finger4_joint1
      - right_finger4_joint2
      - right_finger4_joint3
      - right_finger4_joint4
      - right_finger5_joint1
      - right_finger5_joint2
      - right_finger5_joint3
      - right_finger5_joint4
      command_interfaces:
      - position
