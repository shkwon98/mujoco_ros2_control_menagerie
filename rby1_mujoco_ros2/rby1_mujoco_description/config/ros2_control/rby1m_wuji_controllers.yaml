      - left_finger4_joint3
      - left_finger4_joint4
      - left_finger5_joint1
      - left_finger5_joint2
      - left_finger5_joint3
      - left_finger5_joint4
      command_interfaces:
      - position
      state_interfaces:
      - position
      - velocity
      allow_nonzero_velocity_at_trajectory_end: true
      allow_partial_joints_goal: true
      interpolate_from_desired_state: true
